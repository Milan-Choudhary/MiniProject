<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini AI Bot | Premium Chat</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.1);
        }

        /* GLOBAL */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            height: 100vh;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        /* MAIN */
        .main {
            flex: 1;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        /* CHAT */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* MESSAGE */
        .msg {
            display: flex;
            gap: 10px;
            max-width: 75%;
            animation: fade 0.3s ease;
        }

        .msg.bot {
            align-self: flex-start;
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .bot .bubble {
            background: var(--glass);
            backdrop-filter: blur(10px);
        }

        .user .bubble {
            background: var(--primary);
        }

        /* AVATAR */
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* INPUT */
        .input-area {
            padding: 15px;
            border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .input-box {
            display: flex;
            background: var(--glass);
            border-radius: 30px;
            padding: 8px 15px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        /* ANIMATION */
        @keyframes fade {
            from {opacity:0; transform: translateY(10px);}
            to {opacity:1; transform: translateY(0);}
        }

        #sendBtn svg {
            width: 18px;
            height: 18px;
            fill: white;
            transition: fill 0.2s;
        }

        #sendBtn:disabled svg {
            fill: var(--text-muted);
        }

        /* Spinner inside send btn when loading */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 4px;
        }

        .input-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .char-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ---- Welcome screen ---- */
        .welcome-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 32px 20px;
            gap: 12px;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7c6df0, #5b8dee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(124, 109, 240, 0.4);
            margin-bottom: 4px;
        }

        .welcome-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .welcome-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            max-width: 320px;
            line-height: 1.6;
        }

        /* ---- Responsive ---- */
        @media (max-width: 600px) {
            .page-wrapper { padding: 0; }
            .chat-container {
                border-radius: 0;
                height: 100vh;
                max-width: 100%;
            }
            .message-bubble { max-width: 82%; }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>🤖 Mini AI</h2>
    <button class="new-chat-btn" onclick="location.reload()">+ New Chat</button>
</div>

<div class="main">
    <div class="header">Gemini 1.5 Flash</div>

    <div class="chat" id="chat">
        <div class="msg bot">
            <div class="avatar">AI</div>
            <div class="bubble">Hello! How can I help you?</div>
        </div>

    <div class="input-area">
        <div class="input-box">
            <input id="input" placeholder="Ask anything..." onkeydown="handleEnter(event)">
            <button onclick="send()">➤</button>
        </div>

    </div>
</div>

<script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function handleEnter(e){
        if(e.key === "Enter") send();
    }

    function addMessage(text, type){
        const msg = document.createElement("div");
        msg.className = "msg " + type;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.innerText = type === "user" ? "U" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        if(type === "bot"){
            bubble.innerHTML = marked.parse(text);
        } else {
            bubble.innerText = text;
        }

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chat.appendChild(msg);

        chat.scrollTop = chat.scrollHeight;
    }

    async function send(){
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, "user");
        input.value = "";

        try {
            const res = await fetch("http://localhost:8080/api/chat/ask", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: text})
            });

            const data = await res.text();
            addMessage(data, "bot");

        } catch {
            addMessage("❌ Server error", "bot");
        }
    }
</script>

</body>
</html>
